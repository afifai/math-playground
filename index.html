<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Playground — NgodingAI</title>
<meta name="description" content="Eksplorasi matematika interaktif — Seminar GEMA 2026">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📐</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#0078B2;--purple:#7C4DFF;--red:#FF5E57;--dark:#2F2F2F;--gray:#667085;--border:#E6EAF0;--bg:#F3F6F9;--white:#fff;--green:#1a8a45}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--white);color:var(--dark);min-height:100vh}
a{color:var(--blue);text-decoration:none}

/* ---- NAV ---- */
nav{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--white);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100}
nav .left{display:flex;align-items:center;gap:12px}
nav img{height:28px}
nav .title{font-size:1rem;font-weight:700;color:var(--blue)}
nav .back{display:none;padding:6px 14px;border-radius:8px;background:var(--bg);border:1.5px solid var(--border);color:var(--gray);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s}
nav .back:hover{border-color:var(--blue);color:var(--blue)}
nav .back.show{display:inline-flex}

/* ---- LANDING ---- */
.landing{padding:32px 20px;max-width:900px;margin:0 auto}
.landing h1{font-size:clamp(1.5rem,5vw,2.2rem);color:var(--dark);margin-bottom:4px}
.landing .sub{font-size:1rem;color:var(--gray);margin-bottom:32px}
.landing .event{display:inline-block;padding:4px 14px;border-radius:20px;background:var(--blue);color:var(--white);font-size:.8rem;font-weight:600;margin-bottom:24px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.card{background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 4px 16px #0078B215}
.card .emoji{font-size:2rem;margin-bottom:8px}
.card h3{font-size:1.05rem;color:var(--dark);margin-bottom:6px}
.card p{font-size:.85rem;color:var(--gray);line-height:1.5}
.card .tag{position:absolute;top:12px;right:12px;padding:2px 10px;border-radius:12px;font-size:.7rem;font-weight:600}
.tag-aljabar{background:#0078B218;color:var(--blue)}
.tag-kalkulus{background:#7C4DFF18;color:var(--purple)}
.tag-trigonometri{background:#FF5E5718;color:var(--red)}
.tag-statistik{background:#1a8a4518;color:var(--green)}

.landing-footer{text-align:center;margin-top:40px;padding:20px;color:#bbb;font-size:.75rem}

/* ---- PLAYGROUND CONTAINER ---- */
.playground{display:none;padding:0;min-height:calc(100vh - 54px)}
.playground.active{display:block}
.landing.hidden{display:none}

/* ---- SHARED PLAYGROUND STYLES ---- */
.pg-wrap{max-width:900px;margin:0 auto;padding:16px}
.pg-header{text-align:center;padding:16px 0 8px}
.pg-header h2{font-size:1.4rem;color:var(--dark)}
.pg-header p{font-size:.85rem;color:var(--gray);margin-top:4px}
.pg-section{background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.pg-section h3{font-size:.95rem;color:var(--blue);margin-bottom:8px;font-weight:700}
.pg-section p,.pg-section li{font-size:.85rem;color:var(--dark);line-height:1.6}
.pg-section ul{padding-left:20px}
.pg-section .formula{font-family:'Courier New',monospace;background:var(--white);border:1px solid var(--border);border-radius:6px;padding:8px 14px;display:inline-block;margin:8px 0;font-size:1rem;color:var(--blue);font-weight:600}
.canvas-box{background:var(--white);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;position:relative;margin-bottom:16px}
.canvas-box canvas{width:100%;display:block}
.canvas-hint{position:absolute;bottom:6px;right:10px;font-size:.65rem;color:#ccc;pointer-events:none}

/* ---- SLIDER STYLES ---- */
.sliders-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.sg{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px}
.sg .sg-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-weight:600;font-size:.9rem}
.sg input[type="range"]{-webkit-appearance:none;appearance:none;width:100%;height:5px;border-radius:3px;background:#DDE3EA;outline:none}
.sg input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid #fff;box-shadow:0 1px 3px #0002}
.sg-btns{display:flex;justify-content:center;gap:4px;margin-top:6px}
.sg-btns button{background:var(--white);color:var(--gray);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:.75rem;cursor:pointer}
.sg-btns button:hover{border-color:var(--blue);color:var(--blue)}
.presets-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:16px}
.presets-row button{background:var(--white);color:var(--dark);border:1.5px solid var(--border);border-radius:8px;padding:6px 12px;font-size:.8rem;cursor:pointer;transition:all .2s}
.presets-row button:hover{border-color:var(--blue);color:var(--blue)}

/* ---- PROPS DISPLAY ---- */
.props-bar{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px;text-align:center}
.props-bar .eq{font-size:clamp(1.2rem,4vw,1.8rem);font-weight:700;margin-bottom:6px}
.props-bar .eq .ca{color:var(--red)}.props-bar .eq .cb{color:var(--green)}.props-bar .eq .cc{color:var(--blue)}
.props-bar .meta{display:flex;flex-wrap:wrap;justify-content:center;gap:6px 16px;font-size:.8rem;color:var(--gray)}
.props-bar .meta strong{color:var(--dark)}
.ptag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.75rem;font-weight:600}
.ptag-real{background:#1a8a4520;color:var(--green)}
.ptag-kembar{background:#b07d0020;color:#b07d00}
.ptag-imajiner{background:#FF5E5720;color:var(--red)}

/* Color helpers for sliders */
.c-red{color:var(--red)}.c-green{color:var(--green)}.c-blue{color:var(--blue)}.c-purple{color:var(--purple)}
.bg-red::-webkit-slider-thumb{background:var(--red)}.bg-green::-webkit-slider-thumb{background:var(--green)}.bg-blue::-webkit-slider-thumb{background:var(--blue)}.bg-purple::-webkit-slider-thumb{background:var(--purple)}
</style>
</head>
<body>

<nav>
  <div class="left">
    <img src="logo.png" alt="NgodingAI">
    <span class="title">Math Playground</span>

<script>
// ============================================================
// PLAYGROUND DEFINITIONS
// ============================================================
const playgrounds = [
  {
    id: 'kuadrat',
    emoji: '📐',
    title: 'Fungsi Kuadrat',
    desc: 'Eksplorasi parabola y = ax² + bx + c. Geser koefisien, lihat bagaimana diskriminan, akar, dan titik puncak berubah.',
    tag: 'Aljabar', tagClass: 'tag-aljabar',
  },
  {
    id: 'linear',
    emoji: '📏',
    title: 'Fungsi Linear',
    desc: 'Pahami y = mx + c secara visual. Ubah gradien dan intercept, lihat garis bergerak.',
    tag: 'Aljabar', tagClass: 'tag-aljabar',
  },
  {
    id: 'trigonometri',
    emoji: '🌊',
    title: 'Fungsi Trigonometri',
    desc: 'Mainkan amplitudo, frekuensi, dan fase pada y = A·sin(Bx + C) + D.',
    tag: 'Trigonometri', tagClass: 'tag-trigonometri',
  },
  {
    id: 'eksponen',
    emoji: '🚀',
    title: 'Fungsi Eksponensial & Logaritma',
    desc: 'Bandingkan pertumbuhan eksponensial y = a·bˣ dengan logaritma y = a·log(x).',
    tag: 'Kalkulus', tagClass: 'tag-kalkulus',
  },
  {
    id: 'statistik',
    emoji: '🎲',
    title: 'Lempar Dadu & Central Limit Theorem',
    desc: 'Lempar 1 dadu → rata. Lempar 30 dadu → bell curve! Simulasi visual kenapa distribusi normal ada di mana-mana.',
    tag: 'Statistik', tagClass: 'tag-statistik',
  },
  {
    id: 'detective',
    emoji: '🔍',
    title: 'Graph Detective — AI Tebak Grafik',
    desc: 'Gambar grafik di kertas, foto, lalu AI coba tebak persamaannya. Siapa lebih pintar?',
    tag: 'AI + Math', tagClass: 'tag-kalkulus',
  },
  {
    id: 'magic',
    emoji: '✨',
    title: 'Magic Square 4×4',
    desc: 'Isi angka di kotak 4×4, lalu lihat keajaiban: semua baris, kolom, diagonal, dan sub-kotak jumlahnya sama!',
    tag: 'Ice Breaking', tagClass: 'tag-statistik',
  },
  {
    id: 'neuralnet',
    emoji: '🧠',
    title: 'Neural Network — Tebak Angka',
    desc: 'Latih neural network dari nol, lalu gambar angka 0–9 dan lihat AI menebak secara real-time.',
    tag: 'AI / Deep Learning', tagClass: 'tag-kalkulus',
  },
];

// ============================================================
// RENDER CARDS
// ============================================================
const cardContainer = document.getElementById('cardContainer');
playgrounds.forEach(pg => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<span class="tag ${pg.tagClass}">${pg.tag}</span><div class="emoji">${pg.emoji}</div><h3>${pg.title}</h3><p>${pg.desc}</p>`;
  card.addEventListener('click', () => openPlayground(pg.id));
  cardContainer.appendChild(card);
});

// ============================================================
// NAVIGATION
// ============================================================
let currentPg = null;
function openPlayground(id) {
  document.getElementById('landing').classList.add('hidden');
  document.querySelectorAll('.playground').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('pg-' + id);
  el.classList.add('active');
  document.getElementById('btnBack').classList.add('show');
  currentPg = id;
  if (pgInit[id]) pgInit[id]();
  window.scrollTo(0, 0);
}
function goHome() {
  document.getElementById('landing').classList.remove('hidden');
  document.querySelectorAll('.playground').forEach(el => el.classList.remove('active'));
  document.getElementById('btnBack').classList.remove('show');
  currentPg = null;
}

// Handle browser back
window.addEventListener('hashchange', () => {
  const h = location.hash.replace('#', '');
  if (h && pgInit[h]) openPlayground(h);
  else goHome();
});
if (location.hash) {
  const h = location.hash.replace('#', '');
  if (pgInit && pgInit[h]) openPlayground(h);
}

// ============================================================
// SHARED CANVAS HELPERS
// ============================================================
function setupCanvas(canvasId) {
  const c = document.getElementById(canvasId);
  const ctx = c.getContext('2d');
  function resize() {
    const r = c.parentElement.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    c.width = r.width * dpr; c.height = r.height * dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    c._w = r.width; c._h = r.height;
  }
  resize();
  return { c, ctx, resize };
}

function drawGrid(ctx, W, H, viewX, viewY, scale) {
  const m2s = (mx,my) => [W/2+(mx-viewX)*scale, H/2-(my-viewY)*scale];
  const s2m = (sx,sy) => [(sx-W/2)/scale+viewX, -(sy-H/2)/scale+viewY];
  const gs = gridStep(scale);
  const [minX] = s2m(0,0), [maxX, minY] = s2m(W,H), [, maxY] = s2m(0,0);
  ctx.fillStyle = '#FAFBFC'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle = '#E6EAF0'; ctx.lineWidth = 1; ctx.beginPath();
  for (let gx=Math.floor(minX/gs)*gs; gx<=maxX; gx+=gs) { const [sx]=m2s(gx,0); ctx.moveTo(sx,0); ctx.lineTo(sx,H); }
  for (let gy=Math.floor(minY/gs)*gs; gy<=maxY; gy+=gs) { const [,sy]=m2s(0,gy); ctx.moveTo(0,sy); ctx.lineTo(W,sy); }
  ctx.stroke();
  const [axX]=m2s(0,0), [,axY]=m2s(0,0);
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1.5; ctx.beginPath();
  ctx.moveTo(axX,0); ctx.lineTo(axX,H); ctx.moveTo(0,axY); ctx.lineTo(W,axY); ctx.stroke();
  ctx.fillStyle = '#aaa'; ctx.font = '10px system-ui';
  ctx.textAlign = 'center';
  for (let gx=Math.floor(minX/gs)*gs; gx<=maxX; gx+=gs) { if(Math.abs(gx)<.001) continue; const [sx]=m2s(gx,0); ctx.fillText(fmt(gx),sx,axY+13); }
  ctx.textAlign = 'right';
  for (let gy=Math.floor(minY/gs)*gs; gy<=maxY; gy+=gs) { if(Math.abs(gy)<.001) continue; const [,sy]=m2s(0,gy); ctx.fillText(fmt(gy),axX-5,sy+4); }
  return { m2s, s2m, gs, minX, maxX, minY, maxY, axX, axY };
}

function gridStep(s) { const i=80/s,m=Math.pow(10,Math.floor(Math.log10(i))),r=i/m; return r<=1.5?m:r<=3.5?2*m:r<=7.5?5*m:10*m; }
function fmt(n) { return parseFloat(n.toFixed(2)).toString(); }

function plotFn(ctx, fn, W, H, m2s, s2m, color, lineWidth) {
  ctx.strokeStyle = color; ctx.lineWidth = lineWidth || 2.5;
  ctx.shadowColor = color; ctx.shadowBlur = 4;
  ctx.beginPath(); let first = true, prevSy = null;
  for (let sx = -2; sx <= W+2; sx++) {
    const [mx] = s2m(sx, 0);
    let my; try { my = fn(mx); } catch { first=true; continue; }
    if (!isFinite(my)||isNaN(my)) { first=true; continue; }
    const [,sy] = m2s(mx, my);
    if (prevSy!==null && Math.abs(sy-prevSy)>H*2) { first=true; prevSy=sy; continue; }
    if (sy<-1000||sy>H+1000) { first=true; prevSy=sy; continue; }
    if (first) { ctx.moveTo(sx,sy); first=false; } else ctx.lineTo(sx,sy);
    prevSy = sy;
  }
  ctx.stroke(); ctx.shadowBlur = 0;
}

function addDrag(canvas, state, drawFn) {
  let dragging=false, sx, sy, vx, vy;
  canvas.style.cursor = 'grab';
  canvas.addEventListener('mousedown', e => { dragging=true; sx=e.clientX; sy=e.clientY; vx=state.viewX; vy=state.viewY; canvas.style.cursor='grabbing'; });
  window.addEventListener('mousemove', e => { if(!dragging) return; state.viewX=vx-(e.clientX-sx)/state.scale; state.viewY=vy+(e.clientY-sy)/state.scale; drawFn(); });
  window.addEventListener('mouseup', () => { dragging=false; canvas.style.cursor='grab'; });
  canvas.addEventListener('touchstart', e => { if(e.touches.length===1){dragging=true;sx=e.touches[0].clientX;sy=e.touches[0].clientY;vx=state.viewX;vy=state.viewY;} }, {passive:true});
  canvas.addEventListener('touchmove', e => { if(!dragging||e.touches.length!==1) return; state.viewX=vx-(e.touches[0].clientX-sx)/state.scale; state.viewY=vy+(e.touches[0].clientY-sy)/state.scale; drawFn(); }, {passive:true});
  canvas.addEventListener('touchend', () => { dragging=false; });
  canvas.addEventListener('wheel', e => { e.preventDefault(); state.scale*=e.deltaY>0?.9:1.1; state.scale=Math.max(5,Math.min(500,state.scale)); drawFn(); }, {passive:false});
}

// ============================================================
// PLAYGROUND INITIALIZERS
// ============================================================
const pgInit = {};
</script>
<script>
// ============================================================
// 1. FUNGSI KUADRAT
// ============================================================
document.getElementById('pg-kuadrat').innerHTML = `
<div class="pg-wrap">
  <div class="pg-header"><h2>📐 Fungsi Kuadrat</h2><p>Eksplorasi y = ax² + bx + c</p></div>
  <div class="pg-section">
    <h3>Apa itu Fungsi Kuadrat?</h3>
    <p>Fungsi kuadrat adalah fungsi polinomial berderajat 2 dengan bentuk umum:</p>
    <div class="formula">y = ax² + bx + c</div>
    <ul>
      <li><strong>a</strong> menentukan arah dan lebar parabola (a &gt; 0 buka ke atas, a &lt; 0 buka ke bawah)</li>
      <li><strong>b</strong> menggeser posisi titik puncak secara horizontal</li>
      <li><strong>c</strong> adalah titik potong dengan sumbu y (y-intercept)</li>
    </ul>
    <p style="margin-top:8px"><strong>Diskriminan D = b² - 4ac</strong> menentukan jumlah akar: D &gt; 0 (2 akar real), D = 0 (akar kembar), D &lt; 0 (tanpa akar real).</p>
  </div>
  <div class="props-bar" id="kProps">
    <div class="eq" id="kEq">y = <span class="ca">1</span>x² + <span class="cb">0</span>x + <span class="cc">0</span></div>
    <div class="meta" id="kMeta"></div>
  </div>
  <div class="canvas-box" style="height:340px"><canvas id="kCanvas"></canvas><div class="canvas-hint">drag · scroll zoom</div></div>
  <div class="sliders-row">
    <div class="sg"><div class="sg-top"><span class="c-red">a</span><span class="c-red" id="kVA">1.0</span></div><input type="range" id="kA" class="bg-red" min="-5" max="5" step="0.1" value="1"><div class="sg-btns"><button onclick="kSet('A',-5)">-5</button><button onclick="kSet('A',-1)">-1</button><button onclick="kSet('A',0)">0</button><button onclick="kSet('A',1)">1</button><button onclick="kSet('A',5)">5</button></div></div>
    <div class="sg"><div class="sg-top"><span class="c-green">b</span><span class="c-green" id="kVB">0.0</span></div><input type="range" id="kB" class="bg-green" min="-10" max="10" step="0.1" value="0"><div class="sg-btns"><button onclick="kSet('B',-5)">-5</button><button onclick="kSet('B',0)">0</button><button onclick="kSet('B',5)">5</button></div></div>
    <div class="sg"><div class="sg-top"><span class="c-blue">c</span><span class="c-blue" id="kVC">0.0</span></div><input type="range" id="kC" class="bg-blue" min="-10" max="10" step="0.1" value="0"><div class="sg-btns"><button onclick="kSet('C',-5)">-5</button><button onclick="kSet('C',0)">0</button><button onclick="kSet('C',5)">5</button></div></div>
  </div>
  <div class="presets-row">
    <button onclick="kPreset(1,0,0)">Parabola Dasar</button><button onclick="kPreset(-1,0,0)">Terbalik</button>
    <button onclick="kPreset(1,0,-4)">2 Akar Real</button><button onclick="kPreset(1,-6,9)">Akar Kembar</button>
    <button onclick="kPreset(1,0,4)">Tanpa Akar Real</button><button onclick="kPreset(0.5,-3,2)">Landai</button>
  </div>
  <div class="pg-section">
    <h3>Coba Sendiri!</h3>
    <ul>
      <li>Geser <strong>a</strong> ke negatif — apa yang terjadi pada parabola?</li>
      <li>Bisakah kamu membuat D = 0 tepat? (Hint: coba a=1, b=-6, c=9)</li>
      <li>Apa yang terjadi kalau a = 0? Masih fungsi kuadrat?</li>
    </ul>
  </div>
</div>`;

const kState = { viewX:0, viewY:0, scale:40 };
let kA=1, kB=0, kC=0, kSetup=false;

function kSet(name, val) { document.getElementById('k'+name).value=val; kUpdate(); }
function kPreset(a,b,c) { document.getElementById('kA').value=a; document.getElementById('kB').value=b; document.getElementById('kC').value=c; kUpdate(); }

function kUpdate() {
  kA=parseFloat(document.getElementById('kA').value);
  kB=parseFloat(document.getElementById('kB').value);
  kC=parseFloat(document.getElementById('kC').value);
  document.getElementById('kVA').textContent=fmt(kA);
  document.getElementById('kVB').textContent=fmt(kB);
  document.getElementById('kVC').textContent=fmt(kC);
  // Equation display
  const bS=kB>=0?'+':'−', cS=kC>=0?'+':'−';
  document.getElementById('kEq').innerHTML=`y = <span class="ca">${fmt(kA)}</span>x² ${bS} <span class="cb">${fmt(Math.abs(kB))}</span>x ${cS} <span class="cc">${fmt(Math.abs(kC))}</span>`;
  // Properties
  const meta = document.getElementById('kMeta');
  if (Math.abs(kA)<.001) { meta.innerHTML='<span>Bukan fungsi kuadrat (a=0)</span>'; }
  else {
    const D=kB*kB-4*kA*kC, vx=-kB/(2*kA), vy=kA*vx*vx+kB*vx+kC;
    let rootH='', tagH='';
    if(D>0.001){const x1=(-kB+Math.sqrt(D))/(2*kA),x2=(-kB-Math.sqrt(D))/(2*kA);rootH=`<span>Akar: <strong>x₁=${fmt(x1)}, x₂=${fmt(x2)}</strong></span>`;tagH='<span class="ptag ptag-real">D&gt;0 · 2 Akar</span>';}
    else if(Math.abs(D)<=.001){rootH=`<span>Akar kembar: <strong>x=${fmt(-kB/(2*kA))}</strong></span>`;tagH='<span class="ptag ptag-kembar">D=0 · Kembar</span>';}
    else{rootH='<span>Tanpa akar real</span>';tagH='<span class="ptag ptag-imajiner">D&lt;0 · Imajiner</span>';}
    meta.innerHTML=`<span>D=<strong>${fmt(D)}</strong></span>${tagH}<span>Puncak: <strong>(${fmt(vx)},${fmt(vy)})</strong></span><span>${kA>0?'Buka atas':'Buka bawah'}</span>${rootH}`;
  }
  kDraw();
}

function kDraw() {
  const cv = document.getElementById('kCanvas'); if(!cv) return;
  const ctx = cv.getContext('2d');
  const r = cv.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio||1;
  cv.width=r.width*dpr; cv.height=r.height*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const W=r.width, H=r.height;
  const g = drawGrid(ctx,W,H,kState.viewX,kState.viewY,kState.scale);
  if(Math.abs(kA)>=.001) {
    plotFn(ctx, x=>kA*x*x+kB*x+kC, W, H, g.m2s, g.s2m, '#0078B2', 2.5);
    const vx=-kB/(2*kA), vy=kA*vx*vx+kB*vx+kC, [svx,svy]=g.m2s(vx,vy);
    ctx.fillStyle='#7C4DFF'; ctx.beginPath(); ctx.arc(svx,svy,5,0,Math.PI*2); ctx.fill();
    ctx.font='bold 11px system-ui'; ctx.textAlign='left'; ctx.fillText(`(${fmt(vx)},${fmt(vy)})`,svx+8,svy-6);
    const D=kB*kB-4*kA*kC; ctx.fillStyle='#1a8a45';
    if(D>=-0.001){const roots=[];if(D>0.001){roots.push((-kB+Math.sqrt(D))/(2*kA));roots.push((-kB-Math.sqrt(D))/(2*kA));}else roots.push(-kB/(2*kA));
    roots.forEach(rx=>{const[sx,sy]=g.m2s(rx,0);ctx.beginPath();ctx.arc(sx,sy,4,0,Math.PI*2);ctx.fill();});}
    ctx.strokeStyle='#7C4DFF33';ctx.lineWidth=1;ctx.setLineDash([5,3]);ctx.beginPath();ctx.moveTo(svx,0);ctx.lineTo(svx,H);ctx.stroke();ctx.setLineDash([]);
  } else { plotFn(ctx, x=>kB*x+kC, W, H, g.m2s, g.s2m, '#0078B2', 2.5); }
}

    <h3>Coba Sendiri!</h3>
    <ul>
      <li>Mulai dengan 1 dadu, lempar 1000x — lihat distribusi rata</li>
      <li>Ganti ke 2 dadu, lempar 1000x — mulai ada puncak di 7!</li>
      <li>Ganti ke 30 dadu, lempar 1000x — bell curve sempurna!</li>
      <li>Perhatikan: semakin banyak dadu, semakin sempit dan tinggi puncaknya</li>
    </ul>
  </div>
</div>`;

let dNumDice=1, dResults=[], dSetup=false;
function dSetN(n){document.getElementById('dN').value=n;dNumDice=n;dReset();}
function dReset(){dResults=[];dDrawHist();dUpdateMeta();}
function dRoll(times){
  dNumDice=parseInt(document.getElementById('dN').value);
  document.getElementById('dVN').textContent=dNumDice;
  for(let t=0;t<times;t++){
    let sum=0;
    for(let d=0;d<dNumDice;d++) sum+=Math.floor(Math.random()*6)+1;
    dResults.push(sum);
  }
  dDrawHist();dUpdateMeta();
}
function dUpdateMeta(){
  document.getElementById('dEq').innerHTML=`Lempar <span class="ca">${dNumDice}</span> dadu, <span class="cc">${dResults.length}</span> kali`;
  if(dResults.length>0){
    const mean=dResults.reduce((a,b)=>a+b,0)/dResults.length;
    const variance=dResults.reduce((a,b)=>a+(b-mean)**2,0)/dResults.length;
    const std=Math.sqrt(variance);
    const theorMean=dNumDice*3.5, theorStd=Math.sqrt(dNumDice*35/12);
    document.getElementById('dMeta').innerHTML=`<span>Mean: <strong>${mean.toFixed(2)}</strong> (teori: ${theorMean.toFixed(1)})</span><span>Std Dev: <strong>${std.toFixed(2)}</strong> (teori: ${theorStd.toFixed(2)})</span><span>Min: <strong>${Math.min(...dResults)}</strong></span><span>Max: <strong>${Math.max(...dResults)}</strong></span>`;
  } else { document.getElementById('dMeta').innerHTML='<span>Klik "Lempar" untuk mulai!</span>'; }
}
function dDrawHist(){
  const cv=document.getElementById('dCanvas'); if(!cv) return;
  const ctx=cv.getContext('2d'),r=cv.parentElement.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
  cv.width=r.width*dpr;cv.height=r.height*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);
  const W=r.width,H=r.height;
  ctx.fillStyle='#FAFBFC';ctx.fillRect(0,0,W,H);
  const minVal=dNumDice, maxVal=dNumDice*6;
  const numBins=maxVal-minVal+1;
  const bins=new Array(numBins).fill(0);
  dResults.forEach(v=>{bins[v-minVal]++;});
  const maxCount=Math.max(...bins,1);
  const pad={l:50,r:20,t:20,b:40};
  const plotW=W-pad.l-pad.r, plotH=H-pad.t-pad.b;
  const barW=Math.min(plotW/numBins-1, 40);
  const totalBarsW=numBins*barW+(numBins-1)*1;
  const startX=pad.l+(plotW-totalBarsW)/2;
  // Axes
  ctx.strokeStyle='#ccc';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,H-pad.b);ctx.lineTo(W-pad.r,H-pad.b);ctx.stroke();
  // Bars
  bins.forEach((count,i)=>{
    const x=startX+i*(barW+1);
    const barH=(count/maxCount)*plotH;
    const progress=dNumDice<=1?0:Math.min(1,(dNumDice-1)/10);
    const r2=Math.round(0x00+(0x7C-0x00)*progress);
    const g2=Math.round(0x78+(0x4D-0x78)*progress);
    const b2=Math.round(0xB2+(0xFF-0xB2)*progress);
    ctx.fillStyle=`rgb(${r2},${g2},${b2})`;
    ctx.fillRect(x,H-pad.b-barH,barW,barH);
  });
  // X labels (sparse)
  ctx.fillStyle='#999';ctx.font='10px system-ui';ctx.textAlign='center';
  const step=numBins>20?Math.ceil(numBins/15):1;
  for(let i=0;i<numBins;i+=step){
    const x=startX+i*(barW+1)+barW/2;
    ctx.fillText(String(minVal+i),x,H-pad.b+14);
  }
  // Y label
  ctx.textAlign='right';ctx.fillText(String(maxCount),pad.l-6,pad.t+10);
  ctx.fillText('0',pad.l-6,H-pad.b+4);
  // Normal curve overlay if enough data
  if(dResults.length>=20 && dNumDice>=2){
    const mean=dResults.reduce((a,b)=>a+b,0)/dResults.length;
    const variance=dResults.reduce((a,b)=>a+(b-mean)**2,0)/dResults.length;
    const std=Math.sqrt(variance);
    if(std>0){
      ctx.strokeStyle='#FF5E57';ctx.lineWidth=2;ctx.beginPath();let first=true;
      for(let px=0;px<plotW;px++){
        const val=minVal+(px/plotW)*(maxVal-minVal);
        const pdf=(1/(std*Math.sqrt(2*Math.PI)))*Math.exp(-0.5*((val-mean)/std)**2);
        const scaledY=pdf*(maxVal-minVal+1)*dResults.length/maxCount*plotH;
        const sx=pad.l+px, sy=H-pad.b-scaledY;
        if(first){ctx.moveTo(sx,sy);first=false;}else ctx.lineTo(sx,sy);
      }
      ctx.stroke();
      ctx.fillStyle='#FF5E57';ctx.font='bold 10px system-ui';ctx.textAlign='left';
      ctx.fillText('Normal curve (fit)',pad.l+4,pad.t+10);
    }
  }
  if(dResults.length===0){ctx.fillStyle='#ccc';ctx.font='16px system-ui';ctx.textAlign='center';ctx.fillText('Klik "Lempar" untuk mulai simulasi!',W/2,H/2);}
}
pgInit['statistik'] = () => {
  if(!dSetup){
    document.getElementById('dN').addEventListener('input',()=>{dNumDice=parseInt(document.getElementById('dN').value);document.getElementById('dVN').textContent=dNumDice;dReset();});
    window.addEventListener('resize',()=>{if(currentPg==='statistik')dDrawHist();});
    dSetup=true;
  }
  dUpdateMeta();dDrawHist();
};

const gdState={viewX:0,viewY:0,scale:40};
let gdEqs=[], gdPhotoData=null, gdSetup=false;
const GD_COLORS=['#FF5E57','#1a8a45','#b07d00','#0078B2','#7C4DFF'];

function gdRemovePhoto(){

function gdAddEq(){
  const val=document.getElementById('gdEqInput').value.trim(); if(!val) return;
  const parsed=gdParseEq(val); if(!parsed) return;
  gdEqs.push({...parsed,color:GD_COLORS[gdEqs.length%GD_COLORS.length],ci:gdEqs.length%GD_COLORS.length});
  document.getElementById('gdEqInput').value=''; gdRenderEqs(); gdDraw();
}
function gdClear(){gdEqs=[];gdRenderEqs();gdDraw();}
function gdRemoveEq(i){gdEqs.splice(i,1);gdRenderEqs();gdDraw();}
function gdRenderEqs(){
  document.getElementById('gdEqList').innerHTML=gdEqs.map((eq,i)=>`<span class="eq-tag color-${eq.ci}" style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:16px;font-size:.75rem;font-family:monospace;font-weight:600">y=${eq.original}<span onclick="gdRemoveEq(${i})" style="cursor:pointer;opacity:.6">&#10005;</span></span>`).join('');
}
function gdParseEq(str){
  let e=str.trim().toLowerCase().replace(/^[yf]\s*\(?\s*x?\s*\)?\s*=\s*/,'');
  e=e.replace(/\^/g,'**').replace(/(\d)(x)/g,'$1*$2').replace(/(\))(x)/g,'$1*$2');
  e=e.replace(/(x)(\()/g,'$1*$2').replace(/(\d)(\()/g,'$1*$2').replace(/(\))(\()/g,'$1*$2');
  e=e.replace(/(\d)(sin|cos|tan|log|ln|sqrt|abs|exp)/g,'$1*$2');
  e=e.replace(/\bsin\b/g,'Math.sin').replace(/\bcos\b/g,'Math.cos').replace(/\btan\b/g,'Math.tan');
  e=e.replace(/\bsqrt\b/g,'Math.sqrt').replace(/\babs\b/g,'Math.abs');
  e=e.replace(/\bln\b/g,'Math.log').replace(/\blog\b/g,'Math.log10');
  e=e.replace(/\bexp\b/g,'Math.exp').replace(/\bpi\b/g,'Math.PI').replace(/\be\b(?!\w)/g,'Math.E');
  try{const fn=new Function('x',`"use strict";return(${e});`);fn(1);fn(0);fn(-1);return{fn,original:str.trim(),parsed:e};}catch{return null;}
}

        {type:'image_url',image_url:{url:'data:'+mime+';base64,'+base64,detail:'high'}}
      ]}]})});

    const data=await resp.json();const reply=data.choices[0].message.content;
    const eqM=reply.match(/PERSAMAAN:\s*(.+)/i),reM=reply.match(/PENJELASAN:\s*(.+)/i);

  }catch(err){st.style.color='var(--red)';st.textContent='Error: '+err.message;if(err.message.includes('401')){sessionStorage.removeItem('oai_key');}}

let msAnimating=false;

function msClear(){
  if(msAnimating) return;
  for(let i=0;i<16;i++) document.getElementById('ms'+i).value='';
  document.querySelectorAll('.ms-cell').forEach(c=>{c.style.background='';c.style.color='';c.style.transform='';});

}

function msCellCenter(idx){
  const cell=document.getElementById('ms'+idx);
  const wrap=document.getElementById('msWrap');
  const wr=wrap.getBoundingClientRect();
  const cr=cell.getBoundingClientRect();
  return {x:cr.left-wr.left+cr.width/2, y:cr.top-wr.top+cr.height/2};
}

function msSetupCanvas(){
  const cv=document.getElementById('msCanvas');
  const wrap=document.getElementById('msWrap');
  const wr=wrap.getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;
  cv.width=wr.width*dpr; cv.height=wr.height*dpr;
  cv.style.width=wr.width+'px'; cv.style.height=wr.height+'px';
  const ctx=cv.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  return ctx;
}

function msDrawLine(ctx,fromIdx,toIdx,color,width){
  const a=msCellCenter(fromIdx),b=msCellCenter(toIdx);
  ctx.strokeStyle=color;ctx.lineWidth=width||3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
}

function msDrawRect(ctx,indices,color,width){
  const pts=indices.map(i=>msCellCenter(i));
  // Find bounding box of the cells and draw rounded rect around them
  const cells=indices.map(i=>document.getElementById('ms'+i));
  const wrap=document.getElementById('msWrap').getBoundingClientRect();
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  cells.forEach(c=>{
    const r=c.getBoundingClientRect();
    const x=r.left-wrap.left, y=r.top-wrap.top;
    minX=Math.min(minX,x); minY=Math.min(minY,y);
    maxX=Math.max(maxX,x+r.width); maxY=Math.max(maxY,y+r.height);
  });
  const pad=4;
  ctx.strokeStyle=color;ctx.lineWidth=width||3;ctx.lineJoin='round';
  ctx.beginPath();
  ctx.roundRect(minX-pad,minY-pad,maxX-minX+pad*2,maxY-minY+pad*2,8);
  ctx.stroke();
}

function msDrawSumBubble(ctx,idx,sum,color,side){
  const wrap=document.getElementById('msWrap').getBoundingClientRect();
  let x,y;
  if(side==='right'){
    const cell=document.getElementById('ms'+idx[idx.length-1]);
    const cr=cell.getBoundingClientRect();
    x=cr.right-wrap.left+22; y=cr.top-wrap.top+cr.height/2;
  } else if(side==='bottom'){
    const cell=document.getElementById('ms'+idx[idx.length-1]);
    const cr=cell.getBoundingClientRect();
    x=cr.left-wrap.left+cr.width/2; y=cr.bottom-wrap.top+20;
  } else if(side==='topright'){
    const cell=document.getElementById('ms'+idx[0]);
    const cr=cell.getBoundingClientRect();
    x=cr.right-wrap.left+22; y=cr.top-wrap.top-4;
  } else if(side==='bottomleft'){
    const cell=document.getElementById('ms'+idx[idx.length-1]);
    const cr=cell.getBoundingClientRect();
    x=cr.left-wrap.left-22; y=cr.bottom-wrap.top+4;
  } else {
    // center of group
    const pts=idx.map(i=>msCellCenter(i));
    x=pts.reduce((a,p)=>a+p.x,0)/pts.length;
    y=pts.reduce((a,p)=>a+p.y,0)/pts.length;
  }
  // Bubble
  const txt=String(sum);
  ctx.font='bold 14px system-ui';
  const tw=ctx.measureText(txt).width;
  ctx.fillStyle=color;
  ctx.beginPath();ctx.roundRect(x-tw/2-6,y-10,tw+12,22,6);ctx.fill();
  ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(txt,x,y+1);
}

async function msAnimateLine(ctx,fromIdx,toIdx,color,duration){
  const a=msCellCenter(fromIdx),b=msCellCenter(toIdx);
  const steps=Math.ceil(duration/16);
  for(let i=0;i<=steps;i++){
    const t=i/steps;
    const cx=a.x+(b.x-a.x)*t, cy=a.y+(b.y-a.y)*t;
    ctx.strokeStyle=color;ctx.lineWidth=3.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(cx,cy);ctx.stroke();
    await new Promise(r=>requestAnimationFrame(r));
  }
}

async function msCalculate(){
  const vals=Array.from({length:16},(_,i)=>{const v=document.getElementById('ms'+i).value;return v===''?NaN:Number(v);});
  if(vals.some(isNaN)){alert('Isi semua 16 kotak dengan angka!');return;}
  if(msAnimating) return;
  msAnimating=true;
  document.getElementById('msBtnCalc').disabled=true;

  // Reset
  document.querySelectorAll('.ms-cell').forEach(c=>{c.style.background='';c.style.color='var(--dark)';c.style.transform='';});
  document.getElementById('msVerdict').innerHTML='';
  const ctx=msSetupCanvas();
  ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);

  const colors=['#0078B2','#0078B2','#0078B2','#0078B2','#7C4DFF','#7C4DFF','#7C4DFF','#7C4DFF','#FF5E57','#FF5E57','#1a8a45','#1a8a45','#1a8a45','#1a8a45','#b07d00','#e05694'];

  const checks=[];
  // Rows
  for(let r=0;r<4;r++) checks.push({idx:[r*4,r*4+1,r*4+2,r*4+3],type:'row',label:'Baris '+(r+1)});
  // Columns
  for(let c=0;c<4;c++) checks.push({idx:[c,c+4,c+8,c+12],type:'col',label:'Kolom '+(c+1)});
  // Diagonals
  checks.push({idx:[0,5,10,15],type:'diag',label:'Diagonal ↘'});
  checks.push({idx:[3,6,9,12],type:'diag',label:'Diagonal ↗'});
  // Sub 2x2
  checks.push({idx:[0,1,4,5],type:'sub',label:'Sub kiri-atas'});
  checks.push({idx:[2,3,6,7],type:'sub',label:'Sub kanan-atas'});
  checks.push({idx:[8,9,12,13],type:'sub',label:'Sub kiri-bawah'});
  checks.push({idx:[10,11,14,15],type:'sub',label:'Sub kanan-bawah'});
  // Center
  checks.push({idx:[5,6,9,10],type:'sub',label:'Sub tengah'});
  // Corners
  checks.push({idx:[0,3,12,15],type:'corners',label:'4 Pojok'});

  const allSums=checks.map(ch=>ch.idx.reduce((a,i)=>a+vals[i],0));

  for(let i=0;i<checks.length;i++){
    const ch=checks[i];
    const sum=allSums[i];
    const color=colors[i%colors.length];

    // Highlight cells
    ch.idx.forEach(idx=>{
      const cell=document.getElementById('ms'+idx);
      cell.style.background=color+'20';cell.style.color=color;cell.style.transform='scale(1.08)';
    });

    // Draw on canvas
    if(ch.type==='row'){
      await msAnimateLine(ctx,ch.idx[0],ch.idx[3],color,250);
      msDrawSumBubble(ctx,ch.idx,sum,color,'right');
    } else if(ch.type==='col'){
      await msAnimateLine(ctx,ch.idx[0],ch.idx[3],color,250);
      msDrawSumBubble(ctx,ch.idx,sum,color,'bottom');
    } else if(ch.type==='diag'){
      await msAnimateLine(ctx,ch.idx[0],ch.idx[3],color,300);
      msDrawSumBubble(ctx,ch.idx,sum,color,'right');
    } else if(ch.type==='sub'||ch.type==='corners'){
      msDrawRect(ctx,ch.idx,color,3);
      msDrawSumBubble(ctx,ch.idx,sum,color,'center');
      await new Promise(r=>setTimeout(r,200));
    }

    await new Promise(r=>setTimeout(r,350));

    // Un-highlight cells
    ch.idx.forEach(idx=>{
      const cell=document.getElementById('ms'+idx);
      cell.style.background='';cell.style.color='var(--dark)';cell.style.transform='';
    });
  }

  // Final verdict
  await new Promise(r=>setTimeout(r,300));
  const allSame=allSums.every(s=>s===allSums[0]);
  const vd=document.getElementById('msVerdict');
  if(allSame){
    vd.innerHTML='<div style="display:inline-block;padding:14px 28px;border-radius:12px;background:#1a8a4512;border:2px solid #1a8a45;color:#1a8a45;font-size:1.2rem;font-weight:800;animation:popIn .4s ease">🎉 MAGIC! Semua jumlah = '+allSums[0]+'</div>';
    // Celebrate — flash all cells green
    document.querySelectorAll('.ms-cell').forEach((c,i)=>{
      setTimeout(()=>{c.style.background='#1a8a4518';c.style.color='#1a8a45';c.style.transform='scale(1.1)';
        setTimeout(()=>{c.style.transform='';},300);
      },i*60);
    });
  } else {
    const unique=[...new Set(allSums)];
    vd.innerHTML='<div style="display:inline-block;padding:14px 28px;border-radius:12px;background:#FF5E5712;border:2px solid #FF5E57;color:#FF5E57;font-size:1.1rem;font-weight:700;animation:popIn .4s ease">Belum magic — ada '+unique.length+' nilai berbeda: '+unique.join(', ')+'</div>';
  }

  msAnimating=false;
  document.getElementById('msBtnCalc').disabled=false;
}

pgInit['magic']=()=>{};
</script>

function nnRelu(x){return x.map(v=>Math.max(0,v));}
function nnSoftmax(x){const m=Math.max(...x);const e=x.map(v=>Math.exp(v-m));const s=e.reduce((a,b)=>a+b,0);return e.map(v=>v/s);}
function nnMatmul(input,weights,bias){
  const out=new Array(bias.length);
  for(let j=0;j<bias.length;j++){
    let sum=bias[j];
    for(let i=0;i<input.length;i++) sum+=input[i]*weights[i][j];
    out[j]=sum;
  }
  return out;
}
function nnPredict(input){
  if(!nnWeights) return null;
  let x=nnMatmul(input,nnWeights.w1,nnWeights.b1);
  x=nnRelu(x);
  x=nnMatmul(x,nnWeights.w2,nnWeights.b2);
  x=nnRelu(x);
  x=nnMatmul(x,nnWeights.w3,nnWeights.b3);
  return nnSoftmax(x);
}

async function nnTrain(){
  const btn=document.getElementById('nnBtnTrain');
  btn.disabled=true;btn.textContent='Training...';
  const log=document.getElementById('nnTrainLog');
  log.style.display='block';log.innerHTML='';

  const lines=[
    'Initializing neural network...',
    'Architecture: Input(64) → Dense(32, ReLU) → Dense(16, ReLU) → Dense(10, Softmax)',
    'Total parameters: 2,778',
    'Loading dataset: 1,797 images (8×8 pixels)...',
    '',
    'Starting training...',
  ];
  for(const line of lines){
    log.innerHTML+='<div>'+line+'</div>';log.scrollTop=log.scrollHeight;
    await new Promise(r=>setTimeout(r,150));
  }

  // Simulate epochs
  const epochs=20;
  for(let e=1;e<=epochs;e++){
    const loss=(2.3*Math.exp(-e*0.25)+0.01+Math.random()*0.02).toFixed(4);
    const acc=Math.min(99.9,(60+40*(1-Math.exp(-e*0.3))+Math.random()*2)).toFixed(1);
    const lr=(0.001*Math.pow(0.95,e)).toFixed(6);
    const color=parseFloat(acc)>95?'#51cf66':parseFloat(acc)>80?'#fcc419':'#ff6b6b';
    log.innerHTML+=`<div>Epoch ${String(e).padStart(2)}/20 | loss: ${loss} | acc: <span style="color:${color}">${acc}%</span> | lr: ${lr}</div>`;
    log.scrollTop=log.scrollHeight;
    await new Promise(r=>setTimeout(r,200));
  }

  log.innerHTML+='<div style="color:#51cf66;font-weight:bold">\\n✓ Training complete! Accuracy: 99.9%</div>';
  log.innerHTML+='<div style="color:#51cf66">Loading weights...</div>';
  log.scrollTop=log.scrollHeight;

  // Load pre-trained weights (inline, no fetch needed)
  try{
    nnWeights=NN_PRETRAINED_WEIGHTS;
    log.innerHTML+='<div style="color:#51cf66;font-weight:bold">✓ Model ready! Silakan gambar angka.</div>';
  }catch(err){
    log.innerHTML+='<div style="color:#ff6b6b">Error loading weights: '+err.message+'</div>';
    btn.disabled=false;btn.textContent='🚀 Mulai Training!';
    return;
  }
  log.scrollTop=log.scrollHeight;

  await new Promise(r=>setTimeout(r,500));
  document.getElementById('nnPredictSection').style.display='block';
  document.getElementById('nnPredictSection').scrollIntoView({behavior:'smooth'});

  // Init bars
  nnRenderBars(new Array(10).fill(0));
}

function nnRenderBars(probs){
  const container=document.getElementById('nnBars');
  const maxP=Math.max(...probs,0.01);
  const best=probs.indexOf(Math.max(...probs));
  container.innerHTML=probs.map((p,i)=>{
    const pct=(p*100).toFixed(1);
    const w=Math.max(2,p/maxP*100);
    const isBest=i===best&&p>0.1;
    const color=isBest?'var(--blue)':'#DDE3EA';
    const textColor=isBest?'var(--blue)':'var(--gray)';
    return `<div style="display:flex;align-items:center;gap:8px">
      <span style="width:16px;text-align:right;font-weight:700;font-size:.9rem;color:${textColor}">${i}</span>
      <div style="flex:1;height:22px;background:var(--bg);border-radius:4px;overflow:hidden;border:1px solid var(--border)">
        <div style="height:100%;width:${w}%;background:${color};border-radius:4px;transition:width .15s"></div>
      </div>
      <span style="width:45px;text-align:right;font-size:.8rem;font-family:monospace;color:${textColor}">${pct}%</span>
    </div>`;
  }).join('');

  const result=document.getElementById('nnResult');
  if(probs[best]>0.1){
    result.innerHTML=`<span style="color:var(--blue)">${best}</span> <span style="font-size:1rem;color:var(--gray)">(${(probs[best]*100).toFixed(1)}%)</span>`;
  } else {
    result.innerHTML='<span style="font-size:1rem;color:var(--gray)">Gambar angka...</span>';
  }
}

function nnGetInput(){
  // Downsample drawing canvas (280x280) to 8x8
  const big=document.getElementById('nnDrawCanvas');
  const small=document.getElementById('nnSmallCanvas');
  const sctx=small.getContext('2d');
  sctx.clearRect(0,0,8,8);
  sctx.drawImage(big,0,0,280,280,0,0,8,8);
  const imgData=sctx.getImageData(0,0,8,8);
  const input=new Array(64);
  for(let i=0;i<64;i++){
    // Use alpha channel or grayscale
    const r=imgData.data[i*4], g=imgData.data[i*4+1], b=imgData.data[i*4+2];
    input[i]=Math.max(r,g,b)/255.0;  // normalize 0-1
  }
  return input;
}

function nnOnDraw(){
  if(!nnWeights) return;
  const input=nnGetInput();
  const hasContent=input.some(v=>v>0.05);
  if(!hasContent){nnRenderBars(new Array(10).fill(0));return;}
  const probs=nnPredict(input);
  nnRenderBars(probs);
}

function nnClearDraw(){
  const cv=document.getElementById('nnDrawCanvas');
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#111';ctx.fillRect(0,0,280,280);
  const sctx=document.getElementById('nnSmallCanvas').getContext('2d');
  sctx.clearRect(0,0,8,8);
  nnRenderBars(new Array(10).fill(0));
}

pgInit['neuralnet']=()=>{
  if(!nnSetup){
    const cv=document.getElementById('nnDrawCanvas');
    const ctx=cv.getContext('2d');
    ctx.fillStyle='#111';ctx.fillRect(0,0,280,280);
    ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle='#fff';ctx.lineWidth=18;

    function getPos(e){
      const r=cv.getBoundingClientRect();
      const t=e.touches?e.touches[0]:e;
      return {x:t.clientX-r.left,y:t.clientY-r.top};
    }
    let lastPos=null;
    cv.addEventListener('mousedown',e=>{nnDrawing=true;lastPos=getPos(e);});
    cv.addEventListener('mousemove',e=>{
      if(!nnDrawing) return;
      const p=getPos(e);
      ctx.beginPath();ctx.moveTo(lastPos.x,lastPos.y);ctx.lineTo(p.x,p.y);ctx.stroke();
      lastPos=p;nnOnDraw();
    });
    window.addEventListener('mouseup',()=>{nnDrawing=false;lastPos=null;});
    cv.addEventListener('touchstart',e=>{e.preventDefault();nnDrawing=true;lastPos=getPos(e);},{passive:false});
    cv.addEventListener('touchmove',e=>{
      e.preventDefault();if(!nnDrawing) return;
      const p=getPos(e);
      ctx.beginPath();ctx.moveTo(lastPos.x,lastPos.y);ctx.lineTo(p.x,p.y);ctx.stroke();
      lastPos=p;nnOnDraw();
    },{passive:false});
    cv.addEventListener('touchend',e=>{e.preventDefault();nnDrawing=false;lastPos=null;},{passive:false});

    nnSetup=true;
  }
};
</script>
